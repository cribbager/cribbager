# fly.io configuration for the Cribbager server.
#
# IMPORTANT — RUN EXACTLY ONE MACHINE. All game state is in memory and players
# talk over SSE, so both players of a head-to-head game MUST land on the same
# machine. Deploy with `fly deploy --ha=false` and do not scale above one machine
# until the shard-by-game work is done. min_machines_running = 1 + auto_stop off
# keeps that single machine always on (so in-progress games aren't lost to an
# idle shutdown).

app = "cribbager"
primary_region = "sjc"

# Production is HTTPS-only (force_https below), so set the Secure flag on session
# cookies. This is a non-secret toggle (not a credential) — secrets like
# DATABASE_URL are injected via `fly secrets set`, never committed here.
[env]
  SECURE_COOKIES = "1"
  # Soft heap ceiling below the 256 MB machine so the GC stays under the cap and
  # works harder near it instead of getting OOM-killed (leaves headroom for the
  # runtime's non-heap memory).
  GOMEMLIMIT = "220MiB"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

# A single shared vCPU (shared-cpu-1x). This sizes ONE machine; the single-machine
# guarantee that head-to-head needs comes from --ha=false + min_machines_running.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
